<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking — Valadares</title>
<meta name="description" content="Ranking público dos melhores jogadores do Valadares — top em mobs, PvP, bosses, ouro, temporadas mensais e guilds.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://valadares.app.br/ranking">

<!-- Open Graph -->
<meta property="og:title" content="Ranking — Valadares">
<meta property="og:description" content="Top jogadores do Valadares: mais kills, mais bosses, mais ouro, campeões de temporada.">

<meta property="og:url" content="https://valadares.app.br/ranking">
<meta property="og:image" content="https://valadares.app.br/og.jpg">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0805; --bg-card: #1a1410; --bg-elev: #241b14; --border: #3a2d20;
    --gold: #d4a847; --gold-bright: #f0c060; --blood: #8b2020;
    --text: #e0d8c8; --text-dim: #8a7e6a; --green: #4ab040;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212, 168, 71, 0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(139, 32, 32, 0.06), transparent 40%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  a { color: var(--gold); text-decoration: none; }
  a:hover { color: var(--gold-bright); text-decoration: underline; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 8, 5, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .lang-switch { display: inline-flex; gap: 4px; }
  .lang-switch button {
    background: var(--bg-elev); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px;
    font: 700 12px/1 inherit; letter-spacing: 1px; padding: 7px 10px;
    cursor: pointer; transition: all .15s ease;
  }
  .lang-switch button:hover { color: var(--gold); border-color: var(--gold); }
  .lang-switch button.lang-active { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .nav-brand {
    font-family: "Cinzel", Georgia, serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold); letter-spacing: 2px;
    display: inline-block;
  }
  .nav-brand::before { content: "✦ "; color: var(--gold-bright); }
  main {
    max-width: 1080px; margin: 0 auto;
    padding: 40px 24px 80px;
  }
  h1 {
    font-family: "Cinzel", Georgia, serif;
    color: var(--gold); font-size: 42px;
    text-align: center; letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 32px; font-size: 14px; }
  .updated { color: var(--text-dim); text-align: center; font-size: 12px; margin-bottom: 24px; }
  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-family: inherit;
    padding: 10px 20px; font-size: 14px; letter-spacing: 1px;
    text-transform: uppercase; border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .panel { display: none; }
  .panel.active { display: block; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
  }
  th {
    background: var(--bg-elev); color: var(--gold);
    text-align: left; padding: 12px 16px; font-size: 13px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 16px; font-size: 14px;
    border-bottom: 1px solid rgba(58, 45, 32, 0.4);
  }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: rgba(212, 168, 71, 0.04); }
  .rank-1 td { color: var(--gold-bright); font-weight: 600; }
  .rank-1 .rank-num::before { content: "👑 "; }
  .rank-2 td { color: #c0c0c0; }
  .rank-3 td { color: #cd7f32; }
  .rank-num { width: 50px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .rank-value { text-align: right; font-variant-numeric: tabular-nums; }
  .empty {
    text-align: center; padding: 40px;
    color: var(--text-dim); font-size: 14px;
  }
  .loading { text-align: center; padding: 40px; color: var(--gold); }
  .error { text-align: center; padding: 40px; color: var(--blood); }
  .play-cta {
    display: block; text-align: center; margin: 32px auto 0;
    padding: 14px 32px; max-width: 280px;
    background: var(--gold); color: var(--bg) !important;
    border: 0; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; font-size: 14px;
    border-radius: 2px; cursor: pointer; text-decoration: none !important;
  }
  .play-cta:hover { background: var(--gold-bright); }
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px; text-align: center;
    color: var(--text-dim); font-size: 13px;
  }
  footer a { margin: 0 12px; }
  @media (max-width: 600px) {
    h1 { font-size: 28px; letter-spacing: 2px; }
    .tab { padding: 8px 12px; font-size: 12px; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<script>
// i18n da página de ranking (PT padrão · EN auto-detect + toggle, mesma chave 'valadares_lang').
const I18N_RK = {
  pt: {
    'rk.subtitle': `Os melhores caçadores, lutadores e mercadores de Valadares`,
    'rk.tab_gold': `💰 Ouro`, 'rk.tab_season': `👑 Temporada`, 'rk.tab_arena': `🏟 Arena`, 'rk.tab_depths': `🕳 Profundezas`,
    'rk.cta': `Jogar Valadares`,
    'rk.f_home': `Início`, 'rk.f_play': `Jogar`, 'rk.f_privacy': `Privacidade`, 'rk.f_terms': `Termos`,
    'rk.credit': `Valadares · feito com ♥ em Paranaguá/PR · 2026`,
    'rk.loading': `Carregando…`,
    'rk.empty': `Sem dados ainda — seja o primeiro a aparecer aqui!`,
    'rk.empty_guilds': `Sem guilds no ranking ainda.`,
    'rk.empty_arena': `Ninguém disputou a arena ainda — seja o primeiro!`,
    'rk.empty_depths': `Ninguém desceu às Profundezas ainda — seja o primeiro!`,
    'rk.rating': `Rating`, 'rk.record': `V–D`,
    'rk.floor': `Andar`, 'rk.boss_col': `Boss mais fundo`, 'rk.floor_n': `Andar {n}`, 'rk.no_boss': `—`,
    'rk.season_new': `Temporada nova começando…`,
    'rk.player': `Jogador`, 'rk.gold': `Ouro`, 'rk.members': `Membros`, 'rk.points': `Pontos`,
    'rk.champs': `Campeões anteriores`, 'rk.season_col': `Temporada`, 'rk.champion': `Campeão`,
    'rk.season_label': `Temporada`, 'rk.updated': `Atualizado em`,
    'rk.error': `Não foi possível carregar o ranking agora. Tente novamente em alguns segundos.`
  },
  en: {
    'rk.subtitle': `The finest hunters, fighters and merchants of Valadares`,
    'rk.tab_gold': `💰 Gold`, 'rk.tab_season': `👑 Season`, 'rk.tab_arena': `🏟 Arena`, 'rk.tab_depths': `🕳 The Depths`,
    'rk.cta': `Play Valadares`,
    'rk.f_home': `Home`, 'rk.f_play': `Play`, 'rk.f_privacy': `Privacy`, 'rk.f_terms': `Terms`,
    'rk.credit': `Valadares · made with ♥ in Paranaguá/PR · 2026`,
    'rk.loading': `Loading…`,
    'rk.empty': `No data yet — be the first to show up here!`,
    'rk.empty_guilds': `No guilds in the ranking yet.`,
    'rk.empty_arena': `Nobody has fought in the arena yet — be the first!`,
    'rk.empty_depths': `Nobody has descended into the Depths yet — be the first!`,
    'rk.rating': `Rating`, 'rk.record': `W–L`,
    'rk.floor': `Floor`, 'rk.boss_col': `Deepest boss`, 'rk.floor_n': `Floor {n}`, 'rk.no_boss': `—`,
    'rk.season_new': `New season starting…`,
    'rk.player': `Player`, 'rk.gold': `Gold`, 'rk.members': `Members`, 'rk.points': `Points`,
    'rk.champs': `Past champions`, 'rk.season_col': `Season`, 'rk.champion': `Champion`,
    'rk.season_label': `Season`, 'rk.updated': `Updated`,
    'rk.error': `Couldn't load the ranking right now. Try again in a few seconds.`
  }
};
let LANG = (function(){ try { const s = localStorage.getItem('valadares_lang'); if (s==='pt'||s==='en') return s; return (navigator.language||'pt').toLowerCase().startsWith('en')?'en':'pt'; } catch(e){ return 'pt'; } })();
function tr(k){ const d=I18N_RK; let s=(d[LANG]&&d[LANG][k]); if(s==null) s=(d.pt&&d.pt[k]); return s==null?k:s; }
function numLocale(){ return LANG==='en' ? 'en-US' : 'pt-BR'; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = tr(el.getAttribute('data-i18n')); });
  document.documentElement.lang = (LANG==='en') ? 'en' : 'pt-BR';
  document.documentElement.setAttribute('data-lang', LANG);
}
function updateLangButtons(){ document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('lang-active', b.getAttribute('data-lang-btn')===LANG)); }
function setLang(l){ if(l!=='pt'&&l!=='en') return; LANG=l; try{localStorage.setItem('valadares_lang',l);}catch(e){} applyI18n(); updateLangButtons(); if(typeof load==='function') load(); }
window.addEventListener('DOMContentLoaded', ()=>{ try{ applyI18n(); updateLangButtons(); }catch(e){} });
</script>

<nav>
  <a href="/" class="nav-brand">VALADARES</a>
  <span class="lang-switch">
    <button type="button" data-lang-btn="pt" onclick="setLang('pt')">PT</button>
    <button type="button" data-lang-btn="en" onclick="setLang('en')">EN</button>
  </span>
</nav>

<main>
  <h1>RANKING</h1>
  <p class="subtitle" data-i18n="rk.subtitle">Os melhores caçadores, lutadores e mercadores de Valadares</p>
  <p class="updated" id="updatedAt"></p>

  <div class="tabs" role="tablist">
    <button class="tab active" data-panel="mobs"   role="tab">⚔ Mobs</button>
    <button class="tab"        data-panel="pvp"    role="tab">☠ PvP</button>
    <button class="tab"        data-panel="arena"  role="tab" data-i18n="rk.tab_arena">🏟 Arena</button>
    <button class="tab"        data-panel="depths" role="tab" data-i18n="rk.tab_depths">🕳 Profundezas</button>
    <button class="tab"        data-panel="bosses" role="tab">★ Bosses</button>
    <button class="tab"        data-panel="gold"   role="tab" data-i18n="rk.tab_gold">💰 Ouro</button>
    <button class="tab"        data-panel="guilds" role="tab">📜 Guilds</button>
    <button class="tab"        data-panel="season" role="tab" data-i18n="rk.tab_season">👑 Temporada</button>
  </div>

  <div id="panels">
    <div class="panel active" data-panel="mobs"><div class="loading" data-i18n="rk.loading">Carregando…</div></div>
    <div class="panel"        data-panel="pvp"></div>
    <div class="panel"        data-panel="arena"></div>
    <div class="panel"        data-panel="depths"></div>
    <div class="panel"        data-panel="bosses"></div>
    <div class="panel"        data-panel="gold"></div>
    <div class="panel"        data-panel="guilds"></div>
    <div class="panel"        data-panel="season"></div>
  </div>

  <a class="play-cta" href="/jogar" data-i18n="rk.cta">Jogar Valadares</a>
</main>

<footer>
  <p>
    <a href="/" data-i18n="rk.f_home">Início</a> ·
    <a href="/jogar" data-i18n="rk.f_play">Jogar</a> ·
    <a href="/privacy" data-i18n="rk.f_privacy">Privacidade</a> ·
    <a href="/terms" data-i18n="rk.f_terms">Termos</a> ·
    <a href="https://github.com/acapires-stack/valadares" target="_blank">GitHub</a>
  </p>
  <p style="margin-top: 12px; font-size: 11px;" data-i18n="rk.credit">
    Valadares · feito com ♥ em Paranaguá/PR · 2026
  </p>
</footer>

<script>
const API_URL = 'https://ws.valadares.app.br/api/ranking?limit=20';
const FMT = new Intl.NumberFormat('pt-BR');

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSimple(panel, entries, labelHeader, labelValue, valueFormatter){
  if (!entries || !entries.length){
    panel.innerHTML = '<div class="empty">' + tr('rk.empty') + ' <a href="/jogar">' + tr('rk.cta') + '</a></div>';
    return;
  }
  let rows = '';
  entries.forEach((e, i) => {
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    rows += `<tr class="${cls}">
      <td class="rank-num">${i+1}</td>
      <td>${escapeHtml(e.name)}</td>
      <td class="rank-value">${valueFormatter(e.value)}</td>
    </tr>`;
  });
  panel.innerHTML = `<table>
    <thead><tr><th class="rank-num">#</th><th>${labelHeader}</th><th class="rank-value">${labelValue}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderArena(panel, entries){
  if (!entries || !entries.length){
    panel.innerHTML = '<div class="empty">' + tr('rk.empty_arena') + ' <a href="/jogar">' + tr('rk.cta') + '</a></div>';
    return;
  }
  let rows = '';
  entries.forEach((e, i) => {
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const total = (e.wins || 0) + (e.losses || 0);
    const wr = total ? Math.round((e.wins || 0) / total * 100) : 0;
    rows += `<tr class="${cls}">
      <td class="rank-num">${i+1}</td>
      <td>${escapeHtml(e.name)}</td>
      <td class="rank-value">${FMT.format(e.rating)}</td>
      <td class="rank-value">${e.wins || 0}–${e.losses || 0} <span style="color:var(--text-dim)">(${wr}%)</span></td>
    </tr>`;
  });
  panel.innerHTML = `<table>
    <thead><tr><th class="rank-num">#</th><th>${tr('rk.player')}</th><th class="rank-value">${tr('rk.rating')}</th><th class="rank-value">${tr('rk.record')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderDepths(panel, entries){
  if (!entries || !entries.length){
    panel.innerHTML = '<div class="empty">' + tr('rk.empty_depths') + ' <a href="/jogar">' + tr('rk.cta') + '</a></div>';
    return;
  }
  const floorN = n => tr('rk.floor_n').replace('{n}', n);
  let rows = '';
  entries.forEach((e, i) => {
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    rows += `<tr class="${cls}">
      <td class="rank-num">${i+1}</td>
      <td>${escapeHtml(e.name)}</td>
      <td class="rank-value">${floorN(e.depth)}</td>
      <td class="rank-value">${e.boss ? '👑 ' + floorN(e.boss) : tr('rk.no_boss')}</td>
    </tr>`;
  });
  panel.innerHTML = `<table>
    <thead><tr><th class="rank-num">#</th><th>${tr('rk.player')}</th><th class="rank-value">${tr('rk.floor')}</th><th class="rank-value">${tr('rk.boss_col')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderGuilds(panel, entries){
  if (!entries || !entries.length){
    panel.innerHTML = '<div class="empty">' + tr('rk.empty_guilds') + '</div>';
    return;
  }
  let rows = '';
  entries.forEach((g, i) => {
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    rows += `<tr class="${cls}">
      <td class="rank-num">${i+1}</td>
      <td>${escapeHtml(g.name)}</td>
      <td class="rank-value">${g.members}</td>
      <td class="rank-value">${FMT.format(g.total)}</td>
    </tr>`;
  });
  panel.innerHTML = `<table>
    <thead><tr><th class="rank-num">#</th><th>Guild</th><th class="rank-value">${tr('rk.members')}</th><th class="rank-value">${tr('rk.points')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderSeason(panel, data){
  if (!data || !data.top || !data.top.length){
    panel.innerHTML = '<div class="empty">' + tr('rk.season_new') + '</div>';
    return;
  }
  let rows = '';
  data.top.forEach((e, i) => {
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    rows += `<tr class="${cls}">
      <td class="rank-num">${i+1}</td>
      <td>${escapeHtml(e.name)}</td>
      <td class="rank-value">${FMT.format(e.score)}</td>
    </tr>`;
  });
  let archive = '';
  if (data.archive && data.archive.length){
    archive = '<h3 style="color:var(--gold-bright);margin:24px 0 12px;font-size:16px">' + tr('rk.champs') + '</h3><table><thead><tr><th>' + tr('rk.season_col') + '</th><th>' + tr('rk.champion') + '</th><th class="rank-value">' + tr('rk.points') + '</th></tr></thead><tbody>'
      + data.archive.map(a => `<tr><td>${escapeHtml(a.id)}</td><td>${escapeHtml(a.champion || '—')}</td><td class="rank-value">${FMT.format(a.score || 0)}</td></tr>`).join('')
      + '</tbody></table>';
  }
  panel.innerHTML = `<h3 style="color:var(--gold);margin-bottom:12px;font-size:18px">${tr('rk.season_label')} ${escapeHtml(data.id || '—')}</h3>
    <table>
      <thead><tr><th class="rank-num">#</th><th>${tr('rk.player')}</th><th class="rank-value">${tr('rk.points')}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${archive}`;
}

async function load(){
  const panels = {};
  document.querySelectorAll('#panels .panel').forEach(p => { panels[p.dataset.panel] = p; });
  try {
    const r = await fetch(API_URL, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderSimple(panels.mobs,   data.mobs,   tr('rk.player'), 'Mobs',        v => FMT.format(v));
    renderSimple(panels.pvp,    data.pvp,    tr('rk.player'), 'Kills',       v => FMT.format(v));
    renderArena(panels.arena,   data.arena);
    renderDepths(panels.depths, data.depths);
    renderSimple(panels.bosses, data.bosses, tr('rk.player'), 'Bosses',      v => FMT.format(v));
    renderSimple(panels.gold,   data.gold,   tr('rk.player'), tr('rk.gold'), v => FMT.format(v) + ' g');
    renderGuilds(panels.guilds, data.guilds);
    renderSeason(panels.season, data.season);
    if (data.updatedAt){
      document.getElementById('updatedAt').textContent = tr('rk.updated') + ' ' + new Date(data.updatedAt).toLocaleString(numLocale());
    }
  } catch (err){
    Object.values(panels).forEach(p => {
      p.innerHTML = '<div class="error">' + tr('rk.error') + '</div>';
    });
    console.error('[ranking]', err);
  }
}

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.panel;
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('#panels .panel').forEach(p => {
      p.classList.toggle('active', p.dataset.panel === target);
    });
  });
});

load();
// Atualiza a cada 60s pra refletir kills/gold em tempo quase-real
setInterval(load, 60000);
</script>

</body>
</html>
