<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Valadares — og:image source (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #000; }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background:
      radial-gradient(ellipse at 50% 30%, #2a1e10 0%, #14100a 45%, #0a0805 100%),
      #0a0805;
    color: #f4e4b8;
    font-family: 'Cinzel', Georgia, serif;
    overflow: hidden;
  }
  /* tile grid sutil */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(212, 175, 90, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212, 175, 90, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  /* brilho cental */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(212, 175, 90, 0.18) 0%, transparent 55%);
  }
  /* moldura dourada */
  .frame {
    position: absolute;
    inset: 20px;
    border: 3px solid #8a6a2f;
    box-shadow:
      inset 0 0 0 1px rgba(212, 175, 90, 0.4),
      inset 0 0 60px rgba(212, 175, 90, 0.15);
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 3px solid #d4af5a;
  }
  .frame::before { top: -3px; left: -3px; border-right: 0; border-bottom: 0; }
  .frame::after  { bottom: -3px; right: -3px; border-left: 0; border-top: 0; }

  .content {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 50px;
  }
  .eyebrow {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    letter-spacing: 6px;
    color: #d4af5a;
    margin-bottom: 30px;
    opacity: 0.85;
  }
  .title {
    font-family: 'Cinzel', Georgia, serif;
    font-weight: 900;
    font-size: 168px;
    letter-spacing: 14px;
    line-height: 0.95;
    color: #f4e4b8;
    text-shadow:
      0 0 30px rgba(212, 175, 90, 0.6),
      0 0 80px rgba(212, 175, 90, 0.25),
      0 4px 0 #4a3618;
    margin-bottom: 24px;
  }
  .subtitle {
    font-family: 'Cinzel', Georgia, serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 9px;
    color: #c9a85a;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .badges {
    display: flex;
    gap: 18px;
    margin-bottom: 30px;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .badge {
    padding: 10px 18px;
    border: 2px solid #6a5028;
    background: rgba(20, 14, 8, 0.7);
    color: #e8d290;
  }
  .url {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    letter-spacing: 4px;
    color: #f4e4b8;
    background: linear-gradient(180deg, #5a3e1e 0%, #3a2810 100%);
    padding: 14px 32px;
    border: 2px solid #d4af5a;
    box-shadow: 0 0 20px rgba(212, 175, 90, 0.3);
  }
  /* swords pixelados nos cantos */
  .ornament {
    position: absolute;
    font-size: 60px;
    color: #6a5028;
    opacity: 0.5;
  }
  .ornament.tl { top: 60px; left: 80px; transform: rotate(-25deg); }
  .ornament.tr { top: 60px; right: 80px; transform: rotate(25deg) scaleX(-1); }
  .ornament.bl { bottom: 90px; left: 80px; transform: rotate(-25deg) scaleY(-1); }
  .ornament.br { bottom: 90px; right: 80px; transform: rotate(25deg) scaleY(-1) scaleX(-1); }
</style>
</head>
<body>
  <div class="card">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="frame"></div>

    <div class="ornament tl">⚔</div>
    <div class="ornament tr">⚔</div>
    <div class="ornament bl">🛡</div>
    <div class="ornament br">🛡</div>

    <div class="content">
      <div class="eyebrow">RPG ONLINE</div>
      <div class="title">VALADARES</div>
      <div class="subtitle">Tile-based · Estilo Tibia</div>
      <div class="badges">
        <div class="badge">PC + MOBILE</div>
        <div class="badge">FREE</div>
        <div class="badge">SINGLE + MP</div>
      </div>
      <div class="url">valadares.app.br</div>
    </div>
  </div>
</body>
</html>
