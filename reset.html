<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- Microsoft Clarity (analytics) -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xbcvdqlr9c");

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha — Valadares</title>
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://valadares.app.br/reset">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0805; --bg-card: #1a1410; --bg-elev: #241b14; --border: #3a2d20;
    --gold: #d4a847; --gold-bright: #f0c060; --blood: #8b2020;
    --text: #e0d8c8; --text-dim: #8a7e6a; --green: #4ab040;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212, 168, 71, 0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(139, 32, 32, 0.06), transparent 40%);
    background-attachment: fixed;
    display: flex; flex-direction: column;
  }
  a { color: var(--gold); text-decoration: none; }
  a:hover { color: var(--gold-bright); text-decoration: underline; }
  nav {
    background: rgba(10, 8, 5, 0.92);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .nav-brand {
    font-family: "Cinzel", Georgia, serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold); letter-spacing: 2px;
    display: inline-block;
  }
  .nav-brand::before { content: "✦ "; color: var(--gold-bright); }
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px 28px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  h1 {
    font-family: "Cinzel", Georgia, serif;
    color: var(--gold); font-size: 24px;
    letter-spacing: 2px; text-align: center;
    margin-bottom: 8px;
  }
  .sub { color: var(--text-dim); text-align: center; font-size: 13px; margin-bottom: 24px; }
  label { display: block; color: var(--gold-bright); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; padding: 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 2px;
    font-family: inherit; font-size: 15px;
    margin-bottom: 16px;
  }
  input:focus { outline: 1px solid var(--gold); }
  button {
    width: 100%; padding: 12px;
    background: var(--gold); color: var(--bg);
    border: 0; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; font-size: 14px;
    cursor: pointer; border-radius: 2px;
    font-family: inherit;
  }
  button:hover { background: var(--gold-bright); }
  button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
  .status { margin-top: 14px; text-align: center; font-size: 13px; min-height: 20px; }
  .status.error { color: var(--blood); }
  .status.ok { color: var(--green); }
  .status.info { color: var(--text-dim); }
  .back { text-align: center; margin-top: 18px; font-size: 12px; }
  footer {
    border-top: 1px solid var(--border);
    padding: 24px; text-align: center;
    color: var(--text-dim); font-size: 12px;
  }
  footer a { margin: 0 10px; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">VALADARES</a>
</nav>

<main>
  <div class="card">
    <h1>Redefinir senha</h1>
    <p class="sub" id="sub">Digite a nova senha pra sua conta.</p>

    <form id="resetForm" onsubmit="return submitReset(event)">
      <label for="pwd1">Nova senha</label>
      <input type="password" id="pwd1" minlength="3" maxlength="40" required autocomplete="new-password">

      <label for="pwd2">Confirmar nova senha</label>
      <input type="password" id="pwd2" minlength="3" maxlength="40" required autocomplete="new-password">

      <button type="submit" id="submitBtn">Salvar nova senha</button>

      <div id="status" class="status"></div>
    </form>

    <div class="back">
      <a href="/jogar">Voltar pro jogo</a>
    </div>
  </div>
</main>

<footer>
  <p>
    <a href="/">Início</a> ·
    <a href="/jogar">Jogar</a> ·
    <a href="/privacy">Privacidade</a> ·
    <a href="/terms">Termos</a>
  </p>
</footer>

<script>
// Mesma função hashPw do cliente principal (play.html) — djb2 modificado.
function hashPw(s){
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h<<5) + h + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(36) + ':' + s.length;
}

const SERVER_HTTP_BASE = 'https://ws.valadares.app.br';

// Token vem da query string
const params = new URLSearchParams(location.search);
// Aceita ?t= (formato novo, evita corrupção de `=` em encoders quoted-printable
// de email) e ?token= (legacy, emails enviados antes da mudança).
const token = (params.get('t') || params.get('token') || '').trim();
const statusEl = document.getElementById('status');
const subEl = document.getElementById('sub');
const formEl = document.getElementById('resetForm');
const submitBtn = document.getElementById('submitBtn');

if (!token){
  subEl.textContent = 'Link inválido ou incompleto.';
  formEl.style.display = 'none';
  statusEl.className = 'status error';
  statusEl.textContent = 'Token não encontrado no link.';
}

async function submitReset(ev){
  ev.preventDefault();
  const p1 = document.getElementById('pwd1').value;
  const p2 = document.getElementById('pwd2').value;
  statusEl.className = 'status';
  if (p1.length < 3){
    statusEl.className = 'status error';
    statusEl.textContent = 'Senha precisa de pelo menos 3 caracteres.';
    return false;
  }
  if (p1 !== p2){
    statusEl.className = 'status error';
    statusEl.textContent = 'As senhas não coincidem.';
    return false;
  }
  submitBtn.disabled = true;
  statusEl.className = 'status info';
  statusEl.textContent = '⏳ Salvando…';
  try {
    const r = await fetch(SERVER_HTTP_BASE + '/api/password-reset/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, pwHash: hashPw(p1) }),
    });
    const data = await r.json().catch(() => ({}));
    if (r.ok && data.ok){
      statusEl.className = 'status ok';
      statusEl.textContent = '✓ Senha redefinida! Redirecionando…';
      formEl.style.display = 'none';
      setTimeout(() => { location.href = '/jogar'; }, 1500);
    } else if (data.error === 'invalid_or_expired'){
      statusEl.className = 'status error';
      statusEl.textContent = 'Link expirado ou inválido. Solicite um novo.';
      submitBtn.disabled = false;
    } else {
      statusEl.className = 'status error';
      statusEl.textContent = 'Erro ao salvar. Tente novamente em instantes.';
      submitBtn.disabled = false;
    }
  } catch (e){
    statusEl.className = 'status error';
    statusEl.textContent = 'Sem conexão. Verifique sua internet.';
    submitBtn.disabled = false;
  }
  return false;
}
</script>

</body>
</html>
